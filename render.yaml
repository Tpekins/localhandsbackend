# ==========================================
# RENDER DEPLOYMENT CONFIGURATION
# ==========================================
# This file configures the deployment of the NestJS backend to Render.com
# Place this file in the root of your backend directory

# Service type: Web Service for NestJS API
services:
  # ==========================================
  # MAIN API SERVICE CONFIGURATION
  # ==========================================
  - type: web
    name: localhands-backend
    env: node
    region: oregon  # Choose region closest to your users
    
    # ==========================================
    # BUILD CONFIGURATION
    # ==========================================
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    
    # ==========================================
    # ENVIRONMENT VARIABLES
    # ==========================================
    # These will be set in Render dashboard or via CLI
    envVars:
      - key: NODE_ENV
        value: production
      
      - key: PORT
        value: 3000
      
      # Database URL (will be set automatically if using Render PostgreSQL)
      - key: DATABASE_URL
        fromDatabase:
          name: localhands-db
          property: connectionString
      
      # JWT Configuration
      - key: JWT_SECRET
        generateValue: true  # Render will generate a secure random value
      
      - key: JWT_EXPIRATION
        value: 7d
      
      # Application Configuration
      - key: CORS_ORIGIN
        value: https://your-frontend-domain.vercel.app
      
      # Payment Gateway Configuration
      - key: FABSHI_API_KEY
        sync: false  # Set manually in Render dashboard
      
      - key: FABSHI_SECRET_KEY
        sync: false  # Set manually in Render dashboard
    
    # ==========================================
    # DATABASE CONFIGURATION
    # ==========================================
    databases:
      - name: localhands-db
        databaseName: localhands
        user: localhands_user
        
        # PostgreSQL configuration
        postgresVersion: "16"
        
        # Database settings
        ipAllowList: []  # Empty means allow all (not recommended for production)
        
        # Backup configuration
        backups:
          - name: daily-backup
            schedule: "0 2 * * *"  # Daily at 2 AM UTC
            retentionDays: 7
    
    # ==========================================
    # HEALTH CHECK CONFIGURATION
    # ==========================================
    healthCheckPath: /health
    
    # ==========================================
    # RESOURCE ALLOCATION
    # ==========================================
    # Free tier: 512 MB RAM, 0.1 CPU
    # Paid tiers available for higher performance
    plan: free
    
    # ==========================================
    # AUTO-SCALING (PAID TIERS ONLY)
    # ==========================================
    # autoScaling:
    #   minInstances: 1
    #   maxInstances: 10
    #   targetMemoryPercent: 70
    #   targetCPUPercent: 70

# ==========================================
# CRON JOBS (SCHEDULED TASKS)
# ==========================================
